{% extends 'base.html' %}
{% block title %}Register - TutorBook{% endblock %}

{% block extra_css %}
<style>
.auth-page {
  min-height: calc(100vh - 60px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.1) 0%, transparent 60%);
}
.auth-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px;
  width: 100%;
  max-width: 420px;
  animation: fadeUp 0.4s ease;
}
.auth-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.auth-sub { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
.pw-wrap { position: relative; }
.pw-wrap .form-input { padding-right: 44px; width: 100%; }
.pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; }
.strength-bar-wrap { height: 4px; background: var(--bg4); border-radius: 4px; margin-top: 6px; overflow: hidden; }
#strength-bar { height: 100%; width: 0; border-radius: 4px; transition: all 0.3s; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-title">Create Account 🎓</div>
    <div class="auth-sub">Join TutorBook as a student — it's free!</div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-input" placeholder="Your full name" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pw-wrap">
          <input type="password" name="password" id="pw" class="form-input"
                 placeholder="Min 8 characters"
                 oninput="checkPasswordStrength(this.value)"
                 required minlength="6"/>
          <button type="button" class="pw-toggle" onclick="togglePassword('pw')">👁️</button>
        </div>
        <div class="strength-bar-wrap"><div id="strength-bar"></div></div>
        <div id="strength-text" style="font-size:12px;color:var(--text2);margin-top:3px;"></div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        Create Account →
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text2);">
      Already have an account? <a href="/login" style="color:#a78bfa;font-weight:600;">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
