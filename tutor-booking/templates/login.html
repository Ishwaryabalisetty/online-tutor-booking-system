{% extends 'base.html' %}
{% block title %}Login - TutorBook{% endblock %}

{% block extra_css %}
<style>
.auth-page {
  min-height: calc(100vh - 60px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.1) 0%, transparent 60%);
}
.auth-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px;
  width: 100%;
  max-width: 420px;
  animation: fadeUp 0.4s ease;
}
.auth-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.auth-sub { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
.role-tabs {
  display: flex;
  background: var(--bg3);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
  gap: 4px;
}
.role-tab {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  background: none;
  transition: all 0.15s;
}
.role-tab.active { background: var(--accent); color: white; }
.pw-wrap { position: relative; }
.pw-wrap .form-input { padding-right: 44px; width: 100%; }
.pw-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-title">Welcome back 👋</div>
    <div class="auth-sub">Login to your TutorBook account</div>

    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('student', this)">🎓 Student</button>
      <button class="role-tab" onclick="setRole('tutor', this)">👨‍🏫 Tutor</button>
    </div>

    <form method="POST">
      <input type="hidden" name="role" id="role-input" value="student"/>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pw-wrap">
          <input type="password" name="password" class="form-input" id="pw" placeholder="••••••••" required/>
          <button type="button" class="pw-toggle" onclick="togglePassword('pw')">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        Login →
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text2);">
      Don't have an account? <a href="/register" style="color:#a78bfa;font-weight:600;">Register free</a>
    </p>

    <div style="margin-top:20px;padding:14px;background:var(--bg3);border-radius:10px;font-size:12px;color:var(--text2);">
      <strong style="color:var(--text);">Demo Tutor Login:</strong><br/>
      Email: rahul@tutor.com | Password: password123
    </div>
  </div>
</div>

<script>
function setRole(role, btn) {
  document.getElementById('role-input').value = role
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
}
</script>
{% endblock %}
